name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Sync papers into website
        run: rm -rf website/src/assets/papers && cp -r papers website/src/assets/papers

      # Node sizes in the Connected Papers graph come from citation counts.
      # Refresh them at deploy time so newly added papers get sized; if the
      # citation APIs are down, the committed citations.json is used instead.
      - name: Refresh citation counts
        run: python3 scripts/fetch_citations.py || echo "citation fetch failed, using committed citations.json"

      - name: Install dependencies
        working-directory: website
        run: npm install

      - name: Build
        working-directory: website
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './website/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
